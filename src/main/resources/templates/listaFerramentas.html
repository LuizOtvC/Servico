<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Ferramentas</h2>
            </div><br><br>
            <a th:href="@{/criar}" class="btn btn-primary">
                Nova Ferramenta
            </a><br>
        </div>

        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-0">
               <table class="table table-striped table-hover">
                    <thead>
    <tr class="text-uppercase text-secondary small">
        <th class="ps-4">ID</th>
        <th>Nome</th>
        <th>Horas de Uso</th>
        <th>Vida Útil</th>
        <th>Ações</th>
    </tr>
</thead>
<tbody>
    <tr th:each="lista : ${listaFerramentas}">
        <td class="ps-4" th:text="${lista.id}"></td>
        <td class="fw-semibold" th:text="${lista.nome}"></td>
        <td th:text="${lista.horasDeUso}"></td>
        <td th:text="${lista.vidaUtilMaxima}"></td>
        <td style="min-width: 160px;">
            <td th:replace="~{fragmentos/componentes :: barraDesgaste(f=${lista})}"></td>
            <a th:href="@{/editar/{id}(id=${lista.id})}" class="btn btn-warning btn-sm me-1">Editar</a>
            <a th:href="@{/deletar/{id}(id=${lista.id})}" class="btn btn-danger btn-sm">Excluir</a>
        </td>
    </tr>
</tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
