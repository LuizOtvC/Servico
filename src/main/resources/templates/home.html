<!DOCTYPE html>
<html>
<head><title>
        Home
    </title>
<link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
</head>
<body>
    <div th:replace="~{fragmentos/URL :: custom-header}">
    </div>
 
    
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="loginToast" class="toast align-items-center text-bg-success border-0"
             role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Bem vindo a minha pagina
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
    
    <div class="d-flex align-items-start justify-content-center">
        <a th:href="@{/listar}" class="btn btn-primary">
                listar galpoes
            </a><br> 
        <h1>Bem vindo ao meu site!</h1>
    </div><br>
 
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
<script>
    const toast = new bootstrap.Toast(document.getElementById('loginToast'));
    toast.show();
</script>
</body>

</html>
