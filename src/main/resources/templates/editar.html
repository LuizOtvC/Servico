<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Ferramenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="d-flex align-items-start justify-content-center mt-5">
        <div class="col-md-6">
            <h4 class="mb-4">Editar Ferramenta</h4>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form th:action="@{/editar}" th:object="${ferramenta}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label for="nome" class="form-label fw-bold">Nome</label>
                    <input type="text" class="form-control" id="nome" th:field="*{nome}" required/>
                </div>
                <div class="mb-3">
                    <label for="horasDeUso" class="form-label fw-bold">Horas de Uso</label>
                    <input type="number" class="form-control" id="horasDeUso" th:field="*{horasDeUso}" min="0" required/>
                </div>
                <div class="mb-4">
                    <label for="vidaUtilMaxima" class="form-label fw-bold">Vida Útil Máxima (horas)</label>
                    <input type="number" class="form-control" id="vidaUtilMaxima" th:field="*{vidaUtilMaxima}" min="0" required/>
                </div>
                <div class="d-flex justify-content-between">
                    <a th:href="@{/ferramentas}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
